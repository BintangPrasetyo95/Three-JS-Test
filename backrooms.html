<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Backrooms</title>
    <link rel="stylesheet" href="src/style.css" />
    <style>
      #ui-layer {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        color: #fff;
        font-family: sans-serif;
      }
      .btn {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: 1px solid #555;
        padding: 10px 15px;
        cursor: pointer;
        font-size: 14px;
        border-radius: 4px;
      }
      .btn:hover {
        background: rgba(0, 0, 0, 0.8);
      }
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-family: sans-serif;
        pointer-events: none;
        text-shadow: 1px 1px 2px #000;
        background: rgba(0,0,0,0.5);
        padding: 10px 20px;
        border-radius: 4px;
      }
      #retro-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 50;
        box-shadow: inset 0 0 250px rgba(0,0,0,0.95);
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
        background-size: 100% 4px, 6px 100%;
        opacity: 0.85;
      }
      #jumpscare-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: black;
        z-index: 2000;
        display: none;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }
      .scare-eye {
        width: 15px; height: 15px;
        background: #ff0000;
        border-radius: 50%;
        box-shadow: 0 0 15px #ff0000;
        margin: 0 35px;
      }
    </style>
  </head>
  <body>
    <div id="jumpscare-overlay">
      <div class="scare-eye"></div>
      <div class="scare-eye"></div>
    </div>
    <div id="retro-overlay"></div>
    <div id="ui-layer">
      <button id="audio-toggle" class="btn">Audio: OFF</button>
      <button id="spawn-toggle" class="btn">Dev: Spawn Figure</button>
      <button id="arrow-toggle" class="btn">Dev: Toggle Arrow</button>
    </div>
    <div id="instructions">
      Hold Left Click to look around. Use W, A, S, D to walk.
    </div>
    <canvas id="canvas"></canvas>
    <script type="module" src="./src/backrooms.js"></script>
  </body>
</html>
